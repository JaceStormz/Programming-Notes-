<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Website</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 0;
background: #f9f9f9;
}
header {
background: Green;
padding: 20px;
color: white;
text-align: center;
}
nav {
background: #060606;
padding: 10px;
text-align: center;
}
nav a {
color: white;
margin: 0 15px;
text-decoration: none;
font-weight: bold;
}
nav a:hover {
text-decoration: underline;
}
.page {
display: none;
padding: 20px;
}
.active {
display: block;
}
h2 {
    text-align:center;
}
</style>

            <script>
                function showPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                }
            </script>

<html>
    <body>
            <header>
                <h1>Healthy Snacks and Drinks</h1>
            </header>

            <nav>
                <a href="LandingPage.html" onclick="showPage('home')">Home</a>
                <a href="Contacts.html" onclick="showPage('contact')">Contacts</a>
                <a href="Recipe History.html" onclick="showPage('history')">Recipe History</a>
                <a href="Recipe List.html" onclick="showPage('list')">Recipe List</a>
                <a href="Company Mission & Goals.html" onclick="showPage('mission')">Company Mission & Goals</a>
            </nav>

            <!-- RECIPE LIST PAGE -->
            <section id="list" class="page active">
                <h2>Recipe List</h2>
                <ul>
                    <li>Recipe 1</li>
                    <li>Recipe 2</li>
                    <li>Recipe 3</li>
                </ul>
            </section>

    </body>
</html>
